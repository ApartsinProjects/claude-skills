# GPU2Vast Configuration
# Credentials can also be stored as files in keys/ directory (preferred).
# Copy to ~/.config/gpu2vast/config.yaml only if you prefer a single config file.

vastai:
  api_key: ""              # From https://cloud.vast.ai/account/

r2:
  account_id: ""           # Cloudflare account ID
  access_key: ""           # R2 API token access key
  secret_key: ""           # R2 API token secret key

huggingface:
  token: ""                # For gated models (Llama, etc.)
